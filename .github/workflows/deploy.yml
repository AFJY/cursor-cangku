name: 自动部署

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 如果配置了 Vercel Deploy Hook，自动触发 Vercel 重新部署
      - name: 部署到 Vercel
        if: ${{ secrets.VERCEL_DEPLOY_HOOK != '' }}
        run: |
          curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}" 
          echo "✅ Vercel 部署已触发"

      # 如果开启了 GitHub Pages，也会更新 Pages
      - name: 上传到 GitHub Pages
        if: ${{ vars.ENABLE_PAGES == 'true' }}
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
